    <script>
        // Ensure process.env exists without wiping out existing values
        window.process = window.process || { env: {} };
        window.process.env = window.process.env || {};

        // Bridge GEMINI_API_KEY to API_KEY if needed (matching user's Vercel config)
        if (!window.process.env.API_KEY && window.process.env.GEMINI_API_KEY) {
            window.process.env.API_KEY = window.process.env.GEMINI_API_KEY;
        }

        // Global error tracking for debugging
        window.onerror = function (msg, url, line, col, error) {
            console.error("EduKid Runtime Error: " + msg + " at " + url + ":" + line);
        };
    </script>
